<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinta's Cosmic Hand v3.0 (Full Solar System)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }
        .info-card {
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-left: 5px solid #4facfe;
            border-radius: 8px;
            display: none;
            max-width: 350px;
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.4);
            backdrop-filter: blur(5px);
            line-height: 1.5;
        }
        .info-card h2 { margin-top: 0; margin-bottom: 10px; color: #4facfe; }
        .info-card p { margin: 0; font-size: 14px; color: #ddd; }
        video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 12px;
            border: 2px solid #555;
            transform: scaleX(-1);
            opacity: 0.6;
        }
        canvas { display: block; }
        #status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #4facfe;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }
        #error-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            display: none;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="error-msg">
        <h3>Akses Kamera Gagal :(</h3>
        <p>Pastikan kamu memberikan izin akses kamera atau jalankan file ini menggunakan server (localhost/HTTPS).</p>
    </div>

    <div id="ui-layer">
        <h1>Cosmic Controller</h1>
        <p>🖐️ Buka tangan: Muncul tata surya | ☝️ Tunjuk: Pilih planet | 👌 Cubit: Zoom ke planet</p>
        <div id="planet-info" class="info-card">
            <h2 id="planet-name">Planet</h2>
            <p id="planet-desc">Deskripsi planet...</p>
        </div>
    </div>

    <div id="status-indicator">Inisialisasi...</div>
    <video id="webcam" autoplay playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('webcam');
        const infoCard = document.getElementById('planet-info');
        const pName = document.getElementById('planet-name');
        const pDesc = document.getElementById('planet-desc');
        const statusInd = document.getElementById('status-indicator');
        const errorDiv = document.getElementById('error-msg');

        // Data planet diperbarui dan ditambahkan 3 planet terluar
        const planetData = [
            { name: "Merkurius", color: 0xaaaaaa, size: 3, distance: 50, desc: "Planet terkecil dan paling dekat dengan matahari. Permukaannya dipenuhi kawah seperti bulan.<br><br>⏱️ <b>Rotasi:</b> 59 hari Bumi<br>🚀 <b>Revolusi:</b> 88 hari Bumi" },
            { name: "Venus", color: 0xffcc00, size: 5, distance: 80, desc: "Planet terpanas karena efek rumah kaca ekstrem. Berputar terbalik (retrograde) dari timur ke barat.<br><br>⏱️ <b>Rotasi:</b> 243 hari Bumi<br>🚀 <b>Revolusi:</b> 225 hari Bumi" },
            { name: "Bumi", color: 0x0066ff, size: 5.5, distance: 110, desc: "Satu-satunya planet yang diketahui memiliki kehidupan dan air dalam bentuk cair di permukaannya.<br><br>⏱️ <b>Rotasi:</b> 24 jam<br>🚀 <b>Revolusi:</b> 365,25 hari" },
            { name: "Mars", color: 0xff3300, size: 4.5, distance: 140, desc: "Dikenal sebagai Planet Merah karena kandungan oksida besi. Memiliki gunung berapi tertinggi di Tata Surya (Olympus Mons).<br><br>⏱️ <b>Rotasi:</b> 24,6 jam<br>🚀 <b>Revolusi:</b> 687 hari Bumi" },
            { name: "Jupiter", color: 0xffa500, size: 12, distance: 200, desc: "Raksasa gas terbesar di tata surya, memiliki badai raksasa yang dikenal sebagai Bintik Merah Besar.<br><br>⏱️ <b>Rotasi:</b> 9,9 jam (Tercepat)<br>🚀 <b>Revolusi:</b> 11,8 tahun Bumi" },
            { name: "Saturnus", color: 0xeedd88, size: 10, distance: 270, desc: "Dikenal karena sistem cincinnya yang sangat indah dan megah, terbuat dari bongkahan es dan batuan.<br><br>⏱️ <b>Rotasi:</b> 10,7 jam<br>🚀 <b>Revolusi:</b> 29,5 tahun Bumi" },
            { name: "Uranus", color: 0x66ccff, size: 7, distance: 340, desc: "Planet raksasa es yang sumbu rotasinya sangat miring, sehingga ia tampak seperti menggelinding saat mengorbit.<br><br>⏱️ <b>Rotasi:</b> 17,2 jam (Retrograde)<br>🚀 <b>Revolusi:</b> 84 tahun Bumi" },
            { name: "Neptunus", color: 0x3333ff, size: 6.8, distance: 410, desc: "Planet terjauh dari Matahari yang berwarna biru pekat. Memiliki angin badai terkencang di tata surya.<br><br>⏱️ <b>Rotasi:</b> 16,1 jam<br>🚀 <b>Revolusi:</b> 165 tahun Bumi" }
        ];

        let scene, camera, renderer, sun, pointer;
        let planets = [];
        let stars, solarSystemGroup;
        let isPinching = false;
        let selectedPlanet = null;
        
        // Kamera dijauhkan agar planet terluar bisa terlihat dalam jangkauan
        const defaultCamPos = new THREE.Vector3(0, 400, 650);
        const targetCamPos = new THREE.Vector3().copy(defaultCamPos);
        const currentLookAt = new THREE.Vector3(0, 0, 0);
        const targetLookAt = new THREE.Vector3(0, 0, 0);

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 8000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            solarSystemGroup = new THREE.Group();
            scene.add(solarSystemGroup);

            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<15000; i++) {
                starCoords.push((Math.random()-0.5)*4000, (Math.random()-0.5)*4000, (Math.random()-0.5)*4000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.9 }));
            scene.add(stars);

            const sunGeo = new THREE.SphereGeometry(22, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            sun = new THREE.Mesh(sunGeo, sunMat);
            solarSystemGroup.add(sun);

            const pointerGeo = new THREE.TorusGeometry(8, 1, 16, 100);
            const pointerMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
            pointer = new THREE.Mesh(pointerGeo, pointerMat);
            pointer.visible = false;
            scene.add(pointer);

            planetData.forEach(data => {
                const orbitGeo = new THREE.RingGeometry(data.distance - 0.5, data.distance + 0.5, 128);
                const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.12, transparent: true, side: THREE.DoubleSide });
                const orbitRing = new THREE.Mesh(orbitGeo, orbitMat);
                orbitRing.rotation.x = Math.PI / 2;
                solarSystemGroup.add(orbitRing);
                
                const pGeo = new THREE.SphereGeometry(data.size, 32, 32);
                const pMat = new THREE.MeshPhongMaterial({ color: data.color, shininess: 50 });
                const pMesh = new THREE.Mesh(pGeo, pMat);
                
                // Menambahkan cincin khusus untuk Saturnus
                if (data.name === "Saturnus") {
                    const ringGeo = new THREE.RingGeometry(data.size * 1.4, data.size * 2.3, 64);
                    const ringMat = new THREE.MeshPhongMaterial({ 
                        color: 0xddcca0, side: THREE.DoubleSide, transparent: true, opacity: 0.8 
                    });
                    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                    ringMesh.rotation.x = Math.PI / 2 - 0.3; // Kemiringan cincin
                    pMesh.add(ringMesh);
                }

                const pGroup = new THREE.Group();
                solarSystemGroup.add(pGroup);
                pGroup.add(pMesh);
                pMesh.position.x = data.distance;

                planets.push({ mesh: pMesh, group: pGroup, data, angle: Math.random() * Math.PI * 2 });
            });

            const pLight = new THREE.PointLight(0xffffff, 2.5, 2000);
            scene.add(pLight);
            scene.add(new THREE.AmbientLight(0x444444));

            camera.position.copy(defaultCamPos);
            solarSystemGroup.visible = false;
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.75,
            minTrackingConfidence: 0.75
        });

        hands.onResults(onResults);

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const isHandOpen = landmarks[8].y < landmarks[5].y && landmarks[12].y < landmarks[9].y;
                solarSystemGroup.visible = isHandOpen;
                
                // MEMPERBAIKI INVERTED POINTER: 
                // Menambahkan tanda minus (-) pada x mapping agar berfungsi seperti cermin
                // Nilai pengali diperbesar (1000) agar telunjuk bisa menjangkau planet terluar (Neptunus)
                const ptrX = -(landmarks[8].x - 0.5) * 1000;
                const ptrY = -(landmarks[8].y - 0.5) * 600;
                pointer.position.set(ptrX, ptrY, 50);
                
                const isPointing = landmarks[8].y < landmarks[6].y;
                pointer.visible = isPointing && isHandOpen;

                const dx = landmarks[4].x - landmarks[8].x;
                const dy = landmarks[4].y - landmarks[8].y;
                const pinchDist = Math.sqrt(dx*dx + dy*dy);
                const currentPinch = pinchDist < 0.08; 

                if (isHandOpen && isPointing) {
                    if (!isPinching) {
                        checkSelection(ptrX, ptrY);
                    }
                    if (currentPinch && selectedPlanet) {
                        isPinching = true;
                        statusInd.innerText = "ZOOM: " + selectedPlanet.data.name;
                    } else {
                        isPinching = false;
                        statusInd.innerText = "Sistem Aktif";
                    }
                }
            } else {
                solarSystemGroup.visible = false;
                pointer.visible = false;
                isPinching = false;
                statusInd.innerText = "Tangan Tidak Terdeteksi";
            }
        }

        function checkSelection(x, y) {
            let nearest = null;
            let minDist = 60; // Diperbesar sedikit jangkauan seleksinya
            planets.forEach(p => {
                const worldPos = new THREE.Vector3();
                p.mesh.getWorldPosition(worldPos);
                const d = Math.hypot(worldPos.x - x, worldPos.y - y);
                if (d < minDist) {
                    minDist = d;
                    nearest = p;
                }
            });
            if (nearest) {
                selectedPlanet = nearest;
                pName.innerText = nearest.data.name;
                pDesc.innerHTML = nearest.data.desc; // Menggunakan innerHTML agar tag <br> dan <b> dirender
                infoCard.style.display = 'block';
                pointer.material.color.set(0xffff00);
            } else if (!isPinching) {
                selectedPlanet = null;
                infoCard.style.display = 'none';
                pointer.material.color.set(0x00ffff);
            }
        }

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { 
                try {
                    await hands.send({ image: videoElement }); 
                    errorDiv.style.display = 'none';
                } catch (e) {
                    errorDiv.style.display = 'block';
                }
            },
            width: 640, height: 480
        });

        cameraUtils.start().catch(() => {
            errorDiv.style.display = 'block';
            statusInd.innerText = "Error Kamera";
        });

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0001;

            if (solarSystemGroup.visible) {
                planets.forEach(p => {
                    // Kecepatan planet sekarang menggunakan hukum invers (planet terdekat bergerak lebih cepat)
                    const speed = 0.02 * (40 / p.data.distance);
                    p.angle += speed;
                    p.mesh.position.x = Math.cos(p.angle) * p.data.distance;
                    p.mesh.position.z = Math.sin(p.angle) * p.data.distance;
                    p.mesh.rotation.y += 0.02;
                });
                sun.rotation.y += 0.005;

                if (isPinching && selectedPlanet) {
                    const planetPos = new THREE.Vector3();
                    selectedPlanet.mesh.getWorldPosition(planetPos);
                    // Menyesuaikan zoom camera jika planetnya besar seperti Jupiter / Saturnus
                    const zoomDist = selectedPlanet.data.size * 5 + 30;
                    targetCamPos.set(planetPos.x, planetPos.y + zoomDist/2, planetPos.z + zoomDist);
                    targetLookAt.copy(planetPos);
                } else {
                    targetCamPos.copy(defaultCamPos);
                    targetLookAt.set(0, 0, 0);
                }

                camera.position.lerp(targetCamPos, 0.08);
                currentLookAt.lerp(targetLookAt, 0.08);
                camera.lookAt(currentLookAt);
            }
            renderer.render(scene, camera);
        }

        initThree();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
