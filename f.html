<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Planetarium</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            max-width: 90%;
        }

        h1 { font-size: clamp(1.2rem, 4vw, 2rem); margin: 0; color: #4facfe; text-shadow: 0 0 15px rgba(79,172,254,0.6); }
        .instruction { font-size: clamp(0.7rem, 2vw, 0.9rem); margin: 5px 0; opacity: 0.8; }

        .info-card {
            background: rgba(0, 0, 0, 0.9);
            padding: clamp(15px, 3vw, 20px);
            border-left: 5px solid #4facfe;
            border-radius: 8px;
            display: none;
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.4);
            backdrop-filter: blur(10px);
            line-height: 1.6;
            pointer-events: auto;
        }

        video {
            position: absolute;
            border-radius: 12px;
            border: 2px solid #4facfe;
            transform: scaleX(-1);
            opacity: 0.5;
            background: #111;
            object-fit: cover;
        }

        @media (min-width: 769px) {
            .info-card { margin-top: 20px; max-width: 380px; }
            video { bottom: 20px; right: 20px; width: 240px; height: 180px; }
        }

        @media (max-width: 768px) {
            #ui-layer { top: 10px; left: 10px; }
            .info-card { 
                position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); 
                width: 85%; border-left: none; border-top: 5px solid #4facfe;
            }
            video { top: 10px; right: 10px; width: 90px; height: 70px; }
        }

        #status-indicator {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: #4facfe;
            font-size: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Cosmic Controller</h1>
        <p class="instruction">🖐️ Buka: Muncul | ☝️ Tunjuk: Pilih | 👌 Cubit: Zoom</p>
        <div id="planet-info" class="info-card">
            <h2 id="planet-name" style="margin:0 0 10px 0; color:#4facfe;">Planet</h2>
            <div id="planet-desc" style="font-size:14px; color:#ddd;">Deskripsi...</div>
        </div>
    </div>

    <div id="status-indicator">READY</div>
    <video id="webcam" autoplay playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('webcam');
        const infoCard = document.getElementById('planet-info');
        const pName = document.getElementById('planet-name');
        const pDesc = document.getElementById('planet-desc');
        const statusInd = document.getElementById('status-indicator');

        const planetData = [
            { name: "Merkurius", color: 0xaaaaaa, size: 3, distance: 50, desc: "Planet terkecil dan paling dekat dengan matahari. Permukaannya dipenuhi kawah seperti bulan.<br><br>⏱️ <b>Rotasi:</b> 59 hari Bumi<br>🚀 <b>Revolusi:</b> 88 hari Bumi" },
            { name: "Venus", color: 0xffcc00, size: 5, distance: 80, desc: "Planet terpanas karena efek rumah kaca ekstrem. Berputar terbalik (retrograde) dari timur ke barat.<br><br>⏱️ <b>Rotasi:</b> 243 hari Bumi<br>🚀 <b>Revolusi:</b> 225 hari Bumi" },
            { name: "Bumi", color: 0x0066ff, size: 5.5, distance: 110, desc: "Satu-satunya planet yang diketahui memiliki kehidupan dan air dalam bentuk cair di permukaannya.<br><br>⏱️ <b>Rotasi:</b> 24 jam<br>🚀 <b>Revolusi:</b> 365,25 hari" },
            { name: "Mars", color: 0xff3300, size: 4.5, distance: 140, desc: "Dikenal sebagai Planet Merah karena kandungan oksida besi. Memiliki gunung berapi tertinggi di Tata Surya (Olympus Mons).<br><br>⏱️ <b>Rotasi:</b> 24,6 jam<br>🚀 <b>Revolusi:</b> 687 hari Bumi" },
            { name: "Jupiter", color: 0xffa500, size: 12, distance: 200, desc: "Raksasa gas terbesar di tata surya, memiliki badai raksasa yang dikenal sebagai Bintik Merah Besar.<br><br>⏱️ <b>Rotasi:</b> 9,9 jam (Tercepat)<br>🚀 <b>Revolusi:</b> 11,8 tahun Bumi" },
            { name: "Saturnus", color: 0xeedd88, size: 10, distance: 270, desc: "Dikenal karena sistem cincinnya yang sangat indah dan megah, terbuat dari bongkahan es dan batuan.<br><br>⏱️ <b>Rotasi:</b> 10,7 jam<br>🚀 <b>Revolusi:</b> 29,5 tahun Bumi" },
            { name: "Uranus", color: 0x66ccff, size: 7, distance: 340, desc: "Planet raksasa es yang sumbu rotasinya sangat miring, sehingga ia tampak seperti menggelinding saat mengorbit.<br><br>⏱️ <b>Rotasi:</b> 17,2 jam (Retrograde)<br>🚀 <b>Revolusi:</b> 84 tahun Bumi" },
            { name: "Neptunus", color: 0x3333ff, size: 6.8, distance: 410, desc: "Planet terjauh dari Matahari yang berwarna biru pekat. Memiliki angin badai terkencang di tata surya.<br><br>⏱️ <b>Rotasi:</b> 16,1 jam<br>🚀 <b>Revolusi:</b> 165 tahun Bumi" }
        ];

        let scene, camera, renderer, sun, pointer, solarSystemGroup;
        let planets = [];
        let isPinching = false;
        let selectedPlanet = null;
        
        const defaultCamPos = new THREE.Vector3(0, 450, 750);
        const targetCamPos = new THREE.Vector3().copy(defaultCamPos);
        const currentLookAt = new THREE.Vector3(0, 0, 0);
        const targetLookAt = new THREE.Vector3(0, 0, 0);

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            solarSystemGroup = new THREE.Group();
            scene.add(solarSystemGroup);

            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<10000; i++) starCoords.push((Math.random()-0.5)*4000, (Math.random()-0.5)*4000, (Math.random()-0.5)*4000);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 })));

            sun = new THREE.Mesh(new THREE.SphereGeometry(22, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
            solarSystemGroup.add(sun);

            pointer = new THREE.Mesh(new THREE.TorusGeometry(8, 0.8, 16, 100), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 }));
            pointer.visible = false;
            scene.add(pointer);

            planetData.forEach(data => {
                const orbitGeo = new THREE.RingGeometry(data.distance - 0.5, data.distance + 0.5, 128);
                const orbitMat = new THREE.MeshBasicMaterial({ color: 0x4facfe, opacity: 0.3, transparent: true, side: THREE.DoubleSide });
                const orbitRing = new THREE.Mesh(orbitGeo, orbitMat);
                orbitRing.rotation.x = Math.PI / 2;
                solarSystemGroup.add(orbitRing);

                const pMesh = new THREE.Mesh(new THREE.SphereGeometry(data.size, 32, 32), new THREE.MeshPhongMaterial({ color: data.color }));
                const pGroup = new THREE.Group();
                pGroup.add(pMesh);
                pMesh.position.x = data.distance;

                // Logika Cincin Saturnus (Sekarang di dalam loop)
                if (data.name === "Saturnus") {
                    const ringGeo = new THREE.RingGeometry(data.size * 1.4, data.size * 2.2, 64);
                    const ringMat = new THREE.MeshBasicMaterial({ color: 0xddcca0, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
                    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                    ringMesh.rotation.x = Math.PI / 2.5; 
                    pMesh.add(ringMesh);
                }

                solarSystemGroup.add(pGroup);
                planets.push({ mesh: pMesh, data, angle: Math.random() * Math.PI * 2 });
            });

            scene.add(new THREE.PointLight(0xffffff, 2.5, 2000), new THREE.AmbientLight(0x333333));
            camera.position.copy(defaultCamPos);
            solarSystemGroup.visible = false;
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const isHandOpen = lm[8].y < lm[5].y && lm[12].y < lm[9].y;
                solarSystemGroup.visible = isHandOpen;
                
                const factor = window.innerWidth < 768 ? 600 : 1000;
                const ptrX = -(lm[8].x - 0.5) * factor;
                const ptrY = -(lm[8].y - 0.5) * (factor * 0.6);
                pointer.position.set(ptrX, ptrY, 50);
                pointer.visible = isHandOpen;

                const pinchDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                const currentPinch = pinchDist < 0.08; 

                if (isHandOpen) {
                    if (!isPinching) checkSelection(ptrX, ptrY);
                    if (currentPinch && selectedPlanet) {
                        isPinching = true;
                        statusInd.innerText = "ZOOM: " + selectedPlanet.data.name;
                    } else {
                        isPinching = false;
                        statusInd.innerText = "AKTIF";
                    }
                }
            } else {
                solarSystemGroup.visible = false;
                pointer.visible = false;
                statusInd.innerText = "MENCARI TANGAN...";
            }
        }

        function checkSelection(x, y) {
            let nearest = null;
            let minDist = window.innerWidth < 768 ? 85 : 65; 
            planets.forEach(p => {
                const wp = new THREE.Vector3();
                p.mesh.getWorldPosition(wp);
                const d = Math.hypot(wp.x - x, wp.y - y);
                if (d < minDist) { minDist = d; nearest = p; }
            });
            if (nearest) {
                selectedPlanet = nearest;
                pName.innerText = nearest.data.name;
                pDesc.innerHTML = nearest.data.desc;
                infoCard.style.display = 'block';
            } else if (!isPinching) {
                infoCard.style.display = 'none';
            }
        }

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640, height: 480
        });
        cameraUtils.start();

        function animate() {
            requestAnimationFrame(animate);
            if (solarSystemGroup.visible) {
                planets.forEach(p => {
                    p.angle += 0.012 * (50 / p.data.distance);
                    p.mesh.position.set(Math.cos(p.angle) * p.data.distance, 0, Math.sin(p.angle) * p.data.distance);
                    p.mesh.rotation.y += 0.02;
                });
                
                if (isPinching && selectedPlanet) {
                    const pPos = new THREE.Vector3();
                    selectedPlanet.mesh.getWorldPosition(pPos);
                    const zoomLevel = selectedPlanet.data.size * 5 + 40;
                    targetCamPos.set(pPos.x, pPos.y + zoomLevel/2, pPos.z + zoomLevel);
                    targetLookAt.copy(pPos);
                } else {
                    targetCamPos.copy(defaultCamPos);
                    targetLookAt.set(0, 0, 0);
                }
                camera.position.lerp(targetCamPos, 0.08);
                currentLookAt.lerp(targetLookAt, 0.08);
                camera.lookAt(currentLookAt);
            }
            renderer.render(scene, camera);
        }

        initThree();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
